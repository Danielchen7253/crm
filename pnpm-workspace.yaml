packages:
  - "apps/*"
  - "packages/*"
allowBuilds:
  "@nestjs/core": true
  "@prisma/client": true
  "@prisma/engines": true
  "esbuild": true
  "msgpackr-extract": true
  "prisma": true
  "sharp": true
strictDepBuilds: false
onlyBuiltDependencies:
  - "@nestjs/core"
  - "@prisma/client"
  - "@prisma/engines"
  - "esbuild"
  - "msgpackr-extract"
  - "prisma"
  - "sharp"
