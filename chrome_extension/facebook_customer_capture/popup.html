<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    :root{font-family:Arial,"Microsoft YaHei",sans-serif;color:#17202a}
    body{width:360px;margin:0;background:#f6f8fb;padding:14px}
    h1{font-size:17px;margin:0 0 10px}
    .card{background:#fff;border:1px solid #d8dee8;border-radius:8px;padding:14px;display:grid;gap:12px}
    .muted{color:#6a7682;font-size:13px;line-height:1.5}
    button,a{border:0;border-radius:8px;background:#1f8a70;color:#fff;text-decoration:none;font-weight:800;padding:12px 14px;cursor:pointer;text-align:center;font-size:14px}
    .secondary{background:#e8edf3;color:#17202a}
    .danger{background:#fff2f0;color:#a8071a;border:1px solid #ffccc7}
    #status{font-size:13px;color:#3e4b57;line-height:1.5;white-space:pre-wrap;border:1px solid #edf0f4;border-radius:8px;padding:10px;background:#fbfcfd;min-height:96px}
  </style>
</head>
<body>
  <h1>Coolfix CRM 客户导入</h1>
  <div class="card">
    <div class="muted">打开 Facebook Marketplace 或 Messenger 客户列表后，点击下面按钮。插件会自动扫描页面能加载出来的客户，并导入 CRM。</div>
    <button id="scan-import">扫描客户并导入 CRM</button>
    <button id="stop" class="danger">停止</button>
    <a class="secondary" href="https://crm-8t7y.onrender.com/?view=customers" target="_blank">打开 CRM</a>
    <div id="status">准备就绪。</div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
