<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    :root{font-family:Arial,sans-serif;color:#17202a}
    body{width:360px;margin:0;background:#f6f8fb;padding:14px}
    h1{font-size:17px;margin:0 0 10px}
    .card{background:#fff;border:1px solid #d8dee8;border-radius:8px;padding:14px;display:grid;gap:12px}
    .muted{color:#6a7682;font-size:13px;line-height:1.5}
    button,a{border:0;border-radius:8px;background:#1f8a70;color:#fff;text-decoration:none;font-weight:800;padding:12px 14px;cursor:pointer;text-align:center;font-size:14px}
    .secondary{background:#e8edf3;color:#17202a}
    .danger{background:#fff2f0;color:#a8071a;border:1px solid #ffccc7}
    #status{font-size:13px;color:#3e4b57;line-height:1.55;white-space:pre-wrap;border:1px solid #edf0f4;border-radius:8px;padding:10px;background:#fbfcfd;min-height:112px}
  </style>
</head>
<body>
  <h1>Coolfix Marketplace Capture</h1>
  <div class="card">
    <div class="muted">Open the Marketplace customer chats inside Messenger. Click Start. The extension will skip normal friend chats, capture Marketplace customers one by one, then upload them to CRM.</div>
    <button id="start">Start Marketplace capture</button>
    <button id="stop" class="danger">Stop capture</button>
    <button id="capture-current" class="secondary">Upload current customer only</button>
    <a class="secondary" href="https://crm-8t7y.onrender.com/?view=customers" target="_blank">Open CRM</a>
    <div id="status">Ready.</div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
